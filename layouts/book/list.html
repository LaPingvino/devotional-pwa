{{ partial "head.html" (dict "Title" "Prayer Books" "Lang" "en") }}
<div class="main-content" id="book-root">
  <p style="color:var(--text-secondary)" data-i18n="loading">Loading…</p>
</div>

<script>
(function () {
  function start() {
    var root = document.getElementById('book-root');
    var params = new URLSearchParams(location.search);
    var bookCode = params.get('b');
    if (bookCode) renderBook(root, bookCode);
    else renderIndex(root);
  }

  function safeBookCode(c) { return c.replace(/:/g, '-'); }

  // ── Single-book view: /book/?b=<code> ──
  function renderBook(root, code) {
    fetch('/data/book/' + safeBookCode(code) + '.json').then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(function (bookData) {
      document.title = bookData.name + " — Bahá'í Prayers";
      var langs = bookData.lang_counts || {};
      var langCount = Object.keys(langs).length;
      var isMul = langCount > 1;

      var langSummary = isMul
        ? langCount + ' languages: ' +
          Object.keys(langs).map(function (l) { return [l, langs[l]]; })
            .sort(function (a, b) { return b[1] - a[1]; })
            .map(function (kv) { return '<code>' + kv[0] + '</code>=' + kv[1]; })
            .join(' ')
        : (langCount === 1 ? '<code>' + Object.keys(langs)[0] + '</code>' : '');

      // Header chrome (book name, code, count, lang summary). The renderer
      // only owns the prayer list + TOC — the page header is ours.
      var prayerCount = (bookData.prayers || []).length;
      root.innerHTML =
        '<p style="margin-bottom:.5rem; color:var(--text-secondary); font-size:.85rem">' +
          '<a href="/book/" data-i18n="book_back_all">← All prayer books</a></p>' +
        '<h1 style="margin-bottom:.3rem">' + escapeHtml(bookData.name) + '</h1>' +
        '<p style="color:var(--text-secondary); margin-bottom:1rem">' +
          '<code>' + escapeHtml(bookData.code) + '</code> · ' + prayerCount +
          ' prayer' + (prayerCount === 1 ? '' : 's') +
          (langSummary ? ' · ' + langSummary : '') +
        '</p>' +
        '<div id="book-toc-mount"></div>' +
        '<div id="book-prayer-list"></div>';

      window.renderPrayerList(document.getElementById('book-prayer-list'), {
        prayers: bookData.prayers || [],
        pageLang: '',
        mode: 'book',
        defaultBook: bookData.code,
        toc: true,
        tocEl: document.getElementById('book-toc-mount'),
        showCategoryAnchor: true,
        showFolding: true,
        showFullScreen: true,
        showFavourite: true,
        showLangSwitch: false  // book mode prayers carry no `translations` array
      });
    }).catch(function (e) {
      root.innerHTML =
        '<h1 data-i18n="book_not_found">Book not found</h1>' +
        '<p><span data-i18n="book_not_found_msg">No prayer book matches code</span> ' +
        '<code>' + escapeHtml(code) + '</code> (' + escapeHtml(e.message) + ').</p>' +
        '<p><a href="/book/" data-i18n="book_back_all">← All prayer books</a></p>';
      if (typeof window.__translatePage === 'function') window.__translatePage();
    });
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ── Index view: /book/ ──
  function renderIndex(root) {
    root.innerHTML =
      '<h1 data-i18n="nav_books">Prayer Books</h1>' +
      '<p style="color:var(--text-secondary); margin-bottom:1rem;">' +
        'Compiled prayer books from <a href="https://bahaiprayers.net">bahaiprayers.net</a>, ' +
        'each with its own selection and ordering. Multilingual books like the ' +
        '<em>Namibian</em> compilation gather prayers from several closely-related languages.' +
      '</p>' +
      '<div class="lang-controls" style="margin-bottom:1rem">' +
        '<input type="search" id="book-search" data-i18n-placeholder="book_search_placeholder" placeholder="Search books or languages…" ' +
          'style="flex:1; min-width:180px; padding:.45rem .75rem; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-size:.95rem;">' +
        '<label class="filter-toggle" title="Show only multilingual compilations">' +
          '<input type="checkbox" id="filter-mul"> <span data-i18n="book_filter_mul">Multilingual only</span>' +
        '</label>' +
      '</div>' +
      '<p id="book-count-msg" style="font-size:.8rem; color:var(--text-secondary); margin:.4rem 0 .8rem;"></p>' +
      '<div id="book-list"></div>';

    var list = document.getElementById('book-list');
    var search = document.getElementById('book-search');
    var filterMul = document.getElementById('filter-mul');
    var msg = document.getElementById('book-count-msg');

    fetch('/data/books.json').then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(function (books) {
      function render() {
        var q = search.value.toLowerCase().trim();
        var mulOnly = filterMul.checked;
        var filtered = books.filter(function (b) {
          if (mulOnly && Object.keys(b.langs || {}).length < 2) return false;
          if (!q) return true;
          if (b.name.toLowerCase().includes(q)) return true;
          if (b.code.toLowerCase().includes(q)) return true;
          return Object.keys(b.langs || {}).some(function (l) { return l.toLowerCase().includes(q); });
        });
        msg.textContent = filtered.length + ' of ' + books.length + ' books';
        list.innerHTML = filtered.map(function (b) {
          var langCount = Object.keys(b.langs || {}).length;
          var langSummary = langCount > 1
            ? Object.keys(b.langs).map(function (l) { return [l, b.langs[l]]; })
                .sort(function (a, c) { return c[1] - a[1]; }).slice(0, 6)
                .map(function (kv) { return '<code>' + kv[0] + '</code>=' + kv[1]; }).join(' ')
            : '';
          var isMul = langCount > 1;
          return '<a class="book-card" href="/book/?b=' + b.code + '">' +
            '<div class="book-card-header">' +
              '<span class="book-card-name">' + escapeHtml(b.name) + '</span>' +
              '<span class="book-card-code"><code>' + escapeHtml(b.code) + '</code></span>' +
              '<span class="book-card-count">' + b.count + ' prayer' + (b.count === 1 ? '' : 's') + '</span>' +
            '</div>' +
            (isMul ? '<div class="book-card-langs">' + langCount + ' languages — ' + langSummary + '</div>' : '') +
          '</a>';
        }).join('');
      }
      search.addEventListener('input', render);
      filterMul.addEventListener('change', render);
      render();
      if (typeof window.__translatePage === 'function') window.__translatePage();
    }).catch(function (e) {
      list.innerHTML = '<p>Failed to load book index: ' + escapeHtml(e.message) + '</p>';
    });
  }

  if (window.renderPrayerList) start();
  else document.addEventListener('DOMContentLoaded', start);
})();
</script>

<style>
.book-card {
  display: block;
  margin-bottom: .5rem;
  padding: .7rem 1rem;
  border: 1px solid var(--border, #ddd);
  border-radius: 6px;
  text-decoration: none;
  color: inherit;
  background: var(--surface, transparent);
  transition: border-color .15s;
}
.book-card:hover { border-color: var(--accent, #4a90e2); }
.book-card-header {
  display: flex;
  align-items: baseline;
  gap: .8rem;
  flex-wrap: wrap;
}
.book-card-name { font-weight: 600; }
.book-card-code { color: var(--text-secondary); font-size: .8rem; }
.book-card-count { margin-left: auto; color: var(--text-secondary); font-size: .85rem; }
.book-card-langs { margin-top: .35rem; font-size: .8rem; color: var(--text-secondary); }
.book-card-langs code { background: var(--bg-secondary, #eee); padding: 0 .25em; border-radius: 2px; }
.book-toc {
  margin: 1rem 0 1.5rem;
  padding: .5rem .75rem;
  border: 1px solid var(--border, #ddd);
  border-radius: 6px;
  background: var(--bg-secondary, #fafafa);
}
.book-toc summary {
  cursor: pointer;
  font-size: .85rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.book-toc-chips {
  margin-top: .6rem;
  display: flex;
  flex-wrap: wrap;
  gap: .35rem;
}
.book-toc-chip {
  display: inline-block;
  padding: .2rem .55rem;
  font-size: .8rem;
  text-decoration: none;
  color: var(--text);
  background: var(--surface, #fff);
  border: 1px solid var(--border, #ddd);
  border-radius: 4px;
}
.book-toc-chip:hover { border-color: var(--accent); color: var(--accent); }
.book-toc-count { color: var(--text-secondary); font-size: .85em; }
html { scroll-behavior: smooth; }
</style>
