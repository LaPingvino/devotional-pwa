{{ partial "head.html" (dict "Title" "All Languages" "Lang" "en") }}
<div class="main-content">
  <h1>Bahá'í Prayers</h1>
  <p style="color:var(--text-secondary); margin-bottom:1.5rem;">
    {{ len site.Data.languages }} languages · {{ site.Params.description }}
  </p>
  <div class="lang-grid">
    {{ range site.Data.languages }}
    <a class="lang-card" href="/prayers/{{ .code }}/">
      <span>{{ .name }}</span>
      <span class="count">{{ .prayer_count }}</span>
    </a>
    {{ end }}
  </div>
  <div class="download-all" style="margin-top:2rem; padding:1rem; border-top:1px solid var(--border); text-align:center;">
    <span style="font-size:.9rem; color:var(--text-secondary); margin-right:1rem;">Download all languages:</span>
    <a href="/downloads/prayers_all.pdf" class="dl-link" download style="margin-right:.5rem;">PDF</a>
    <a href="/downloads/prayers_all.epub" class="dl-link" download>EPUB</a>
  </div>
</div>
{{ partial "foot.html" . }}
