{{ partial "head.html" (dict "Title" "Phelps Inventory" "Lang" "en") }}
<div class="main-content">
  <h1>Phelps Inventory</h1>
  <p style="color:var(--text-secondary); margin-bottom:1rem;">
    29,113 Bahá'í prayer codes (PIN) with first lines. Source: Phelps Index.
  </p>

  <div class="inventory-controls">
    <button class="prefix-btn active" data-prefix="">All</button>
    <button class="prefix-btn" data-prefix="BH">BH</button>
    <button class="prefix-btn" data-prefix="AB">AB</button>
    <button class="prefix-btn" data-prefix="BB">BB</button>
    <button class="prefix-btn" data-prefix="BHU">BHU</button>
    <button class="prefix-btn" data-prefix="ABU">ABU</button>
    <button class="prefix-btn" data-prefix="BBU">BBU</button>
    <input type="search" class="search-box" id="inv-search" placeholder="Search PIN or first line…">
  </div>

  <div id="inv-status" style="font-size:.8rem; color:var(--text-secondary); margin-bottom:.5rem;"></div>

  <table class="inventory-table" id="inv-table">
    <thead>
      <tr>
        <th>PIN</th>
        <th>First line (English)</th>
      </tr>
    </thead>
    <tbody id="inv-body">
      <tr><td colspan="2" style="padding:1rem; color:var(--text-secondary)">Loading…</td></tr>
    </tbody>
  </table>
</div>

<script>
let allEntries = [];
let filtered = [];
let activePrefix = '';
let searchTerm = '';

async function loadInventory() {
  const res = await fetch('/data/inventory.json');
  allEntries = await res.json();
  applyFilters();
}

function applyFilters() {
  filtered = allEntries.filter(e => {
    if (activePrefix && e.prefix !== activePrefix) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      return e.pin.toLowerCase().includes(q) || e.first_line.toLowerCase().includes(q);
    }
    return true;
  });
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('inv-body');
  const status = document.getElementById('inv-status');
  status.textContent = `${filtered.length.toLocaleString()} entries`;

  // Limit to 500 rows for performance
  const rows = filtered.slice(0, 500);
  tbody.innerHTML = rows.map(e =>
    `<tr>
      <td class="pin-cell"><a href="/phelps/${e.pin.toLowerCase()}/">${e.pin}</a></td>
      <td>${e.first_line || ''}</td>
    </tr>`
  ).join('');
  if (filtered.length > 500) {
    tbody.innerHTML += `<tr><td colspan="2" style="color:var(--text-secondary); padding:.5rem">
      … ${(filtered.length - 500).toLocaleString()} more. Refine your search.
    </td></tr>`;
  }
}

// Prefix buttons
document.querySelectorAll('.prefix-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.prefix-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePrefix = btn.dataset.prefix;
    applyFilters();
  });
});

// Search
let searchTimer;
document.getElementById('inv-search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = e.target.value.trim();
    applyFilters();
  }, 200);
});

// Pre-fill search from ?pin= URL param (used by phelps pages linking to inventory)
const urlParams = new URLSearchParams(window.location.search);
const pinParam = urlParams.get('pin');
if (pinParam) {
  document.getElementById('inv-search').value = pinParam;
  searchTerm = pinParam;
}

loadInventory();
</script>
