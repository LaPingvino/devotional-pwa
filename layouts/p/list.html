{{ partial "head.html" (dict "Title" "Prayer" "Lang" "en") }}
<div class="main-content" id="p-root">
  <p style="color:var(--text-secondary)" data-i18n="loading">Loading…</p>
</div>

<script src="/js/render-md.js"></script>
<script>
(async function () {
  const root = document.getElementById('p-root');
  const params = new URLSearchParams(location.search);
  const rawV = (params.get('v') || '').toLowerCase().trim();
  // Accept either canonical UUID (36 chars with hyphens) or base36 (~25 chars).
  // The version_index is keyed by canonical UUID, so convert if needed.
  const uuid = (rawV.indexOf('-') >= 0)
    ? rawV
    : (window.base36ToUuid ? window.base36ToUuid(rawV) : rawV);

  if (!rawV) {
    root.innerHTML = `
      <h1>Prayer Permalink</h1>
      <p>Open a prayer with <code>/p/?v=&lt;version-uuid&gt;</code>.</p>
      <p>You can find a prayer's permalink by clicking its <strong>v</strong>
        link on any <a href="/prayers/">prayers page</a>.</p>`;
    return;
  }

  function err(msg) {
    root.innerHTML = `<h1>Prayer not found</h1>
      <p>No prayer matches version <code>${rawV}</code>.</p>
      <p style="color:var(--text-secondary)">${msg}</p>
      <p><a href="/prayers/">← Browse prayers by language</a></p>`;
  }

  let index;
  try {
    const r = await fetch('/data/version_index.json');
    if (!r.ok) throw new Error('index HTTP ' + r.status);
    index = await r.json();
  } catch (e) {
    err('Failed to load version index: ' + e.message);
    return;
  }

  const entry = index[uuid];
  if (!entry) { err('UUID not in index.'); return; }
  const [lang, phelps] = entry;

  let langData;
  try {
    const r = await fetch(`/data/prayers/${lang}.json`);
    if (!r.ok) throw new Error('lang HTTP ' + r.status);
    langData = await r.json();
  } catch (e) {
    err('Failed to load language data: ' + e.message);
    return;
  }

  const prayer = (langData.prayers || []).find(p => p.phelps === phelps);
  if (!prayer) { err(`Prayer ${phelps} not found in ${lang}.`); return; }

  document.title = (prayer.name ? prayer.name + ' — ' : '') + phelps + " — Bahá'í Prayers";

  const RTL = new Set(['ar', 'fa', 'ur', 'he', 'ug']);
  const isRtl = RTL.has(lang);
  const baseL = phelps.toLowerCase().replace(/[a-z]{3}$/, '');
  const suffix = phelps.toLowerCase().slice(baseL.length);

  // Resolve a friendly language name from the translations or fall back to the code.
  let langName = lang;
  for (const t of (prayer.translations || [])) {
    if (t.language && t.language.toLowerCase() === lang) { langName = t.lang_name; break; }
  }

  // Look up the prayer's native book name (Prayer.Book on the data side) so
  // the page can offer a "Part of: X →" navigation. Books and languages
  // share /prayers/<code>/, so the link goes to the safe-coded book URL.
  let bookHtml = '';
  if (prayer.book) {
    try {
      const r = await fetch('/data/prayerbooks.json');
      if (r.ok) {
        const books = await r.json();
        const b = books.find(x => x.code === prayer.book);
        const name = b ? b.name : prayer.book;
        const safe = prayer.book.replace(/:/g, '-').toLowerCase();
        bookHtml = ` · <a href="/prayers/${safe}/" title="View this book">📖 Part of: ${name}</a>`;
      }
    } catch {}
  }

  const transHtml = (prayer.translations || []).length === 0 ? '' : `
    <div class="prayer-translations" style="margin-top:1rem">
      <span class="trans-label">Also in:</span>
      <details class="lang-dropdown" open>
        <summary>${prayer.translations.length} language${prayer.translations.length > 1 ? 's' : ''}</summary>
        <div class="lang-dropdown-panel">
          <div class="lang-dropdown-list">
            ${prayer.translations.map(t =>
              `<a href="/prayers/${t.language.toLowerCase()}/#${phelps}">${t.lang_name}<span class="lang-code-badge">${t.language}</span></a>`
            ).join('')}
          </div>
        </div>
      </details>
    </div>`;

  // Use the short base36 form for storage if conversion is possible; matches
  // the format devotional items expect in their `v` field.
  const shortV = (window.uuidToBase36 && uuid) ? window.uuidToBase36(uuid) : rawV;

  root.innerHTML = `
    <article class="prayer-card" style="margin:0">
      ${prayer.name ? `<h1 style="margin-bottom:.5rem">${prayer.name}</h1>` : ''}
      <p style="color:var(--text-secondary); margin-bottom:1rem">
        <a href="/phelps/${baseL}/${suffix ? '#' + suffix : ''}">${phelps}</a>
        · <span class="prayer-lang-badge">${lang}</span> ${langName}
        · <a href="/prayers/${lang}/#${phelps}">View in ${langName} prayerbook →</a>${bookHtml}
      </p>
      <div class="prayer-text"${isRtl ? ' dir="rtl"' : ''}>${window.renderMd ? window.renderMd(prayer.text || '') : (prayer.text || '')}</div>
      ${prayer.notes ? `<div class="prayer-notes" style="margin-top:1rem; color:var(--text-secondary); font-style:italic">${prayer.notes}</div>` : ''}
      <div style="display:flex; gap:.5rem; margin-top:1.2rem; flex-wrap:wrap">
        <button class="btn-action" id="add-latest" title="Add this prayer to your devotional program (will track latest translation)">+ Add to devotional</button>
        <button class="btn-action" id="add-pinned" title="Add this prayer pinned to this EXACT translation — won't change if a newer translation arrives">\u{1F4CC} Pin to devotional</button>
        <a href="/devotional/" class="btn-action" style="text-decoration:none; display:inline-block" title="Open your devotional program">View devotional →</a>
      </div>
      <p style="color:var(--text-secondary); font-size:.75rem; margin-top:1rem">
        Permalink: <code>/p/?v=${shortV}</code>
      </p>
      ${transHtml}
    </article>`;

  // Wire up the add buttons. Storage shape matches /devotional/'s normalizeItem:
  // {code, lang?, v?}. The unpinned add omits v; the pinned add sets v to the
  // base36 form so it round-trips with the rest of the codebase.
  const STORAGE_KEY = 'hw_devotional_codes';
  function getCodes() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
  }
  function saveCodes(items) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }
  function flash(btn, text) {
    const orig = btn.textContent;
    btn.textContent = text;
    btn.disabled = true;
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
  }
  function addItem(item, btn, label) {
    const items = getCodes();
    const exists = items.some(i =>
      (i.code || i) === item.code &&
      (i.lang || undefined) === (item.lang || undefined) &&
      (i.v || undefined) === (item.v || undefined)
    );
    if (exists) { flash(btn, '✓ already added'); return; }
    items.push(item);
    saveCodes(items);
    flash(btn, '✓ ' + label);
  }
  document.getElementById('add-latest').addEventListener('click', e => {
    addItem({ code: phelps }, e.currentTarget, 'added');
  });
  document.getElementById('add-pinned').addEventListener('click', e => {
    addItem({ code: phelps, v: shortV }, e.currentTarget, 'pinned');
  });
})();
</script>
