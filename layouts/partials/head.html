<!DOCTYPE html>
<html lang="{{ .Lang | default "en" }}"{{ if .Params.rtl }} dir="rtl"{{ end }}>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — {{ site.Title }}</title>
  {{ with .Params.description }}<meta name="description" content="{{ . }}">{{ end }}
  {{ with .Permalink }}<link rel="canonical" href="{{ . }}">{{ end }}
  {{ $css := resources.Get "css/main.css" | minify }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
<header class="site-header">
  <a href="/" class="title">{{ site.Title }}</a>
  <nav>
    <a href="/inventory/">Inventory</a>
  </nav>
</header>
