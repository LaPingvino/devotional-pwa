<div class="main-content" id="detail-root">
  <p style="color:var(--text-secondary)">Loading…</p>
</div>

<script>
(async function () {
  // When served via Cloudflare 200 rewrite, location.pathname is the ORIGINAL URL,
  // e.g. /phelps/bh01313/ even though we're rendering this page.
  const parts = location.pathname.replace(/\/$/, '').split('/').filter(Boolean);
  // parts[0] = 'phelps', parts[1] = slug like 'bh01313'
  const slug = (parts[1] || '').toUpperCase();
  if (!slug || slug === 'DETAIL') {
    // Direct navigation to /phelps/detail/ — redirect to inventory list
    location.replace('/phelps/');
    return;
  }

  // Hash may hold a sub-code suffix, e.g. #nam → NAM
  const hashSuffix = location.hash.replace('#', '').toUpperCase();

  document.title = slug + ' — Bahá\'í Prayers';

  const AUTHORS = {
    BH: "Bahá'u'lláh", BHU: "Bahá'u'lláh",
    AB: "ʻAbdu'l-Bahá",  ABU: "ʻAbdu'l-Bahá",
    BB: "The Báb",       BBU: "The Báb",
  };
  function authorFromPin(pin) {
    const m = pin.match(/^([A-Z]+)/);
    return m ? (AUTHORS[m[1]] || '') : '';
  }

  // basePIN: strip trailing 3-char alpha mnemonic suffix
  function basePIN(p) {
    const n = p.length;
    if (n < 4) return p;
    const suf = p.slice(n - 3);
    if (/^[A-Z]{3}$/.test(suf) && /\d/.test(p[n - 4])) return p.slice(0, n - 3);
    return p;
  }

  function renderTranslations(translations, code) {
    if (!translations || translations.length === 0) return '';
    const count = translations.length;
    const links = translations.map(t =>
      `<a href="/prayers/${t.language.toLowerCase()}/#${code}" data-code="${t.language.toLowerCase()}" data-name="${t.lang_name.toLowerCase()}">${t.lang_name}<span class="lang-code-badge">${t.language}</span></a>`
    ).join('\n');
    const filter = count > 6 ? `<input type="search" class="lang-filter-input" placeholder="Filter languages…" autocomplete="off">` : '';
    return `
      <details class="lang-dropdown">
        <summary>${count} translation${count === 1 ? '' : 's'}</summary>
        <div class="lang-dropdown-panel">
          ${filter}
          <div class="lang-dropdown-list">${links}</div>
        </div>
      </details>
      <div class="prayer-texts" data-code="${code}" style="margin-top:.8rem;"></div>`;
  }

  // Simple markdown renderer (same as devotional page)
  function renderMd(text) {
    if (!text) return '';
    return text
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>').replace(/$/, '</p>');
  }

  // Load and display prayer texts for a given code
  const textCache = {};
  async function loadPrayerTexts(code, container, translations) {
    if (!translations || translations.length === 0) return;
    // Show a "Load texts" button first
    const btn = document.createElement('button');
    btn.textContent = `Show prayer texts (${translations.length} languages)`;
    btn.style.cssText = 'font-size:.8rem; padding:.3rem .8rem; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--accent); cursor:pointer; margin-bottom:.5rem;';
    btn.addEventListener('click', async () => {
      btn.textContent = 'Loading…';
      btn.disabled = true;
      let html = '';
      for (const t of translations) {
        const lang = t.language.toLowerCase();
        if (!textCache[lang]) {
          try {
            const r = await fetch(`/data/prayers/${lang}.json`);
            if (r.ok) textCache[lang] = await r.json();
          } catch (_) {}
        }
        const prayers = textCache[lang] || [];
        const match = prayers.find(p => p.phelps === code);
        if (match) {
          const dir = ['ar','fa','he','ur','ps','ku','sd','yi'].includes(lang) ? ' dir="rtl"' : '';
          const rendered = renderMd(match.text);
          html += `<details class="prayer-text-card" style="margin-bottom:.4rem; border:1px solid var(--border); border-radius:6px;">
            <summary style="padding:.4rem .6rem; font-size:.8rem; cursor:pointer;">
              <strong>${t.lang_name}</strong> <span style="opacity:.5">${lang}</span>
            </summary>
            <div class="prayer-text" style="padding:.5rem .8rem; font-size:.85rem; line-height:1.6;"${dir}>${rendered}</div>
          </details>`;
        }
      }
      if (!html) html = '<p style="font-size:.8rem; color:var(--text-secondary)">No prayer texts found for this code.</p>';
      container.innerHTML = html;
    });
    container.appendChild(btn);
  }

  function renderWritingRefs(refs) {
    if (!refs || refs.length === 0) return '';
    const chips = refs.map(r =>
      `<a href="/writings/${r.type}/${r.language.toLowerCase()}/" style="font-size:.78rem; padding:.2rem .5rem; background:var(--bg); border:1px solid var(--border); border-radius:12px; text-decoration:none; color:var(--text);">${r.type_name} (${r.lang_name})</a>`
    ).join('');
    return `
      <div style="margin-bottom:.8rem;">
        <div style="font-size:.8rem; font-weight:600; color:var(--text-secondary); margin-bottom:.3rem;">Appears in:</div>
        <div style="display:flex; flex-wrap:wrap; gap:.4rem;">${chips}</div>
      </div>`;
  }

  function renderSubcode(sc, multi) {
    const parts = [];
    if (sc.language) parts.push(`<span class="meta-badge">${sc.language}</span>`);
    if (sc.word_count) parts.push(`<span class="meta-badge">${sc.word_count} words</span>`);

    return `
      <div class="subcode-section"${sc.anchor ? ` id="${sc.anchor}"` : ''}
           style="margin-bottom:2rem; border:1px solid var(--border); border-radius:8px; padding:1rem;">
        ${multi ? `<div style="font-family:monospace; font-size:1rem; font-weight:700; color:var(--accent); margin-bottom:.5rem;">
          ${sc.code}${sc.anchor ? ` <a href="#${sc.anchor}" style="font-size:.75rem; opacity:.5; font-weight:400">#${sc.anchor}</a>` : ''}
        </div>` : ''}
        ${sc.title ? `<div style="font-size:1rem; font-weight:600; margin-bottom:.3rem">${sc.title}</div>` : ''}
        ${sc.first_line ? `<div style="color:var(--text-secondary); font-style:italic; font-size:.9rem; margin-bottom:.3rem">"${sc.first_line}"</div>` : ''}
        ${sc.first_line_orig ? `<div style="font-size:.85rem; color:var(--text-secondary); margin-bottom:.3rem">${sc.first_line_orig}</div>` : ''}
        <div style="display:flex; flex-wrap:wrap; gap:.4rem; font-size:.8rem; margin-bottom:.6rem;">${parts.join('')}</div>
        ${sc.subjects ? `<div class="meta-badge" style="display:block; margin-bottom:.6rem; font-size:.75rem">${sc.subjects}</div>` : ''}
        ${sc.notes ? `<div style="font-size:.8rem; color:var(--text-secondary); background:var(--surface); border-radius:4px; padding:.5rem; margin-bottom:.6rem;">${sc.notes}</div>` : ''}
        ${renderWritingRefs(sc.writing_refs)}
        ${renderTranslations(sc.translations, sc.code)}
      </div>`;
  }

  try {
    // Try loading the rich phelps JSON first (has subcodes, translations, writing_refs)
    const phelpsSlug = slug.toLowerCase();
    let phelpsData = null;
    try {
      const pRes = await fetch(`/data/phelps/${phelpsSlug}.json`);
      if (pRes.ok) phelpsData = await pRes.json();
    } catch (_) {}

    const root = document.getElementById('detail-root');

    if (phelpsData && phelpsData.subcodes && phelpsData.subcodes.length > 0) {
      // Rich render from phelps JSON
      const multi = phelpsData.subcodes.length > 1;
      const author = authorFromPin(slug);
      root.innerHTML = `
        <div style="margin-bottom:1.5rem;">
          <div style="display:flex; align-items:baseline; gap:.6rem; flex-wrap:wrap;">
            <span style="font-family:monospace; font-size:1.4rem; font-weight:700; color:var(--accent)">${slug}</span>
            ${author ? `<span class="author-badge">${author}</span>` : ''}
          </div>
          <div style="margin-top:.4rem; font-size:.85rem; color:var(--text-secondary)">
            ${multi ? phelpsData.subcodes.length + ' passages · ' : ''}
            <a href="/phelps/" style="color:var(--accent)">← Inventory</a>
          </div>
        </div>
        ${phelpsData.subcodes.map(sc => renderSubcode(sc, multi)).join('')}
        <p style="margin-top:1.5rem; font-size:.85rem; color:var(--text-secondary)">
          <a href="/phelps/" data-i18n="inventory_back">← Back to Inventory</a>
        </p>`;
    } else {
      // Fallback: load from inventory.json
      const res = await fetch('/data/inventory.json');
      const entries = await res.json();
      const matching = entries.filter(e => basePIN(e.pin) === slug);

      if (matching.length === 0) {
        root.innerHTML = `
          <h1 style="font-family:monospace; color:var(--accent)">${slug}</h1>
          <p style="color:var(--text-secondary); margin-bottom:1rem;">
            This code was not found in the Phelps inventory.
          </p>
          <p><a href="/phelps/" style="color:var(--accent)">← Inventory</a> &nbsp;
             <a href="/" style="color:var(--accent)">← All languages</a></p>`;
        return;
      }

      // Basic render from inventory data
      const author = authorFromPin(slug);
      root.innerHTML = `
        <div style="margin-bottom:1.5rem;">
          <div style="display:flex; align-items:baseline; gap:.6rem; flex-wrap:wrap;">
            <span style="font-family:monospace; font-size:1.4rem; font-weight:700; color:var(--accent)">${slug}</span>
            ${author ? `<span class="author-badge">${author}</span>` : ''}
          </div>
          <div style="margin-top:.4rem; font-size:.85rem; color:var(--text-secondary)">
            ${matching.length > 1 ? matching.length + ' passages · ' : ''}
            <a href="/phelps/" style="color:var(--accent)">← Inventory</a>
          </div>
        </div>
        ${matching.map(e => renderSubcode({
          code: e.pin, anchor: '', title: e.title, first_line: e.first_line,
          first_line_orig: e.first_line_orig, language: e.language,
          word_count: e.word_count, subjects: e.subjects, notes: e.notes,
          translations: e.langs || [], writing_refs: []
        }, matching.length > 1)).join('')}
        <p style="margin-top:1.5rem; font-size:.85rem; color:var(--text-secondary)">
          <a href="/phelps/" data-i18n="inventory_back">← Back to Inventory</a>
        </p>`;
    }

    // Scroll to hash anchor if present
    if (hashSuffix) {
      const target = document.getElementById(hashSuffix.toLowerCase());
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    }

    // Wire up language filter inputs
    document.querySelectorAll('.lang-dropdown').forEach(dd => {
      const input = dd.querySelector('.lang-filter-input');
      if (!input) return;
      const links = Array.from(dd.querySelectorAll('.lang-dropdown-list a'));
      input.addEventListener('input', () => {
        const q = input.value.toLowerCase().trim();
        links.forEach(a => {
          a.style.display = (!q || a.dataset.code.includes(q) || a.dataset.name.includes(q)) ? '' : 'none';
        });
      });
    });

    // Wire up prayer text loaders
    const allSubcodes = phelpsData ? phelpsData.subcodes : null;
    document.querySelectorAll('.prayer-texts').forEach(container => {
      const code = container.dataset.code;
      // Find translations for this code
      let trans = [];
      if (allSubcodes) {
        const sc = allSubcodes.find(s => s.code === code);
        if (sc) trans = sc.translations || [];
      }
      if (trans.length > 0) loadPrayerTexts(code, container, trans);
    });
  } catch (err) {
    document.getElementById('detail-root').innerHTML =
      `<p style="color:var(--text-secondary)">Error loading data. <a href="/phelps/">← Back</a></p>`;
  }
})();
</script>
