{{ partial "head.html" (dict "Title" "Search" "Lang" "en") }}
<div class="main-content">
  <h1 data-i18n="search_title">Search</h1>
  <p style="color:var(--text-secondary); margin-bottom:1rem;">
    Browse all prayers and writings by Phelps code. Search works across all languages.
  </p>

  <div class="inventory-controls">
    <button class="prefix-btn active" data-prefix="">All</button>
    <button class="prefix-btn" data-prefix="BH" title="Bahá'u'lláh">BH</button>
    <button class="prefix-btn" data-prefix="AB" title="ʻAbdu'l-Bahá">AB</button>
    <button class="prefix-btn" data-prefix="BB" title="The Báb">BB</button>
    <button class="prefix-btn" data-prefix="BHU">BHU</button>
    <button class="prefix-btn" data-prefix="ABU">ABU</button>
    <button class="prefix-btn" data-prefix="BBU">BBU</button>
    <button class="prefix-btn" data-prefix="UH" title="Universal House of Justice">UH</button>
    <button class="prefix-btn" data-prefix="TMP">TMP</button>
    <button class="prefix-btn" data-prefix="X">X</button>
    <input type="search" class="search-box" id="exp-search" placeholder="Search in any language…">
  </div>

  <div style="display:flex; gap:.5rem; align-items:center; margin-bottom:.5rem; flex-wrap:wrap;">
    <div id="exp-status" style="font-size:.85rem; color:var(--text-secondary);"></div>
    <div style="margin-left:auto; display:flex; gap:.3rem; align-items:center; font-size:.8rem; color:var(--text-secondary);">
      <details class="search-lang-dropdown" id="lang1-dropdown">
        <summary id="lang1-label">English</summary>
        <div class="search-lang-panel">
          <input type="search" class="search-lang-filter" id="lang1-filter" placeholder="Filter…" autocomplete="off">
          <div class="search-lang-list" id="lang1-list"></div>
        </div>
      </details>
      <details class="search-lang-dropdown" id="lang2-dropdown">
        <summary id="lang2-label">+ compare</summary>
        <div class="search-lang-panel">
          <input type="search" class="search-lang-filter" id="lang2-filter" placeholder="Filter…" autocomplete="off">
          <div class="search-lang-list" id="lang2-list"></div>
        </div>
      </details>
      Sort:
      <button class="sort-btn active" data-sort="count">Languages ↓</button>
      <button class="sort-btn" data-sort="code">Code ↑</button>
    </div>
  </div>

  <table class="inventory-table" id="exp-table">
    <thead>
      <tr>
        <th>Code</th>
        <th>Author</th>
        <th id="th-first">First line</th>
        <th id="th-second" style="display:none">Compare</th>
        <th style="text-align:right"># Langs</th>
        <th>Languages</th>
      </tr>
    </thead>
    <tbody id="exp-body">
      <tr><td colspan="5" style="padding:1rem; color:var(--text-secondary)">Loading…</td></tr>
    </tbody>
  </table>
</div>

<style>
.sort-btn {
  padding: .15rem .5rem; border: 1px solid var(--border); border-radius: 3px;
  background: var(--surface); cursor: pointer; font-size: .8rem; color: var(--text-secondary);
}
.sort-btn:hover, .sort-btn.active { border-color: var(--accent); color: var(--accent); background: #fff3ef; }
.lang-chip {
  display:inline-block; padding:.05rem .3rem; margin:.05rem; background:#f0f0f0;
  border-radius:3px; font-size:.7rem; color:var(--text); text-decoration:none;
}
.lang-chip:hover { background:#ff7954; color:#fff; }
/* Language picker (reused from old search) */
.search-lang-dropdown { position: relative; }
.search-lang-dropdown summary {
  padding: .3rem .6rem; border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg); font-size: .8rem; cursor: pointer; list-style: none; color: var(--text); white-space: nowrap;
}
.search-lang-dropdown summary::-webkit-details-marker { display: none; }
.search-lang-panel {
  position: fixed; top: auto; left: 1rem; right: 1rem;
  margin-top: 2px;
  background: var(--surface, #fff); border: 1px solid var(--border); border-radius: 6px;
  box-shadow: 0 4px 12px rgba(0,0,0,.15); max-width: 320px; max-height: 400px;
  overflow: hidden; z-index: 200; display: flex; flex-direction: column;
}
.search-lang-filter {
  margin: .4rem; padding: .3rem .5rem; border: 1px solid var(--border); border-radius: 4px;
  font-size: .85rem; background: var(--bg); color: var(--text);
}
.search-lang-list { overflow-y: auto; max-height: 300px; }
.search-lang-list a {
  display: flex; justify-content: space-between; padding: .3rem .6rem;
  font-size: .85rem; color: var(--text); text-decoration: none; cursor: pointer;
}
.search-lang-list a:hover { background: #fff3ef; }
.search-lang-list a.active { font-weight: 700; color: var(--accent); }
.lang-count-badge { font-size: .75rem; color: var(--text-secondary); }
</style>

<script>
const AUTHORS = {
  BH: "Bahá'u'lláh", BHU: "Bahá'u'lláh",
  AB: "ʻAbdu'l-Bahá", ABU: "ʻAbdu'l-Bahá",
  BB: "The Báb", BBU: "The Báb",
  XBH: "Bahá'u'lláh", XAB: "ʻAbdu'l-Bahá",
  UH: "Universal House of Justice", UHR: "Universal House of Justice",
};

function authorFromPin(pin) {
  const m = pin.match(/^([A-Z]+)/);
  return m ? (AUTHORS[m[1]] || '') : '';
}

function phelpsUrl(pin) {
  const n = pin.length;
  const suffix = pin.slice(n - 3);
  if (/^[A-Z]{3}$/.test(suffix) && /\d/.test(pin[n - 4])) {
    return `/phelps/${pin.slice(0, n - 3).toLowerCase()}/#${suffix.toLowerCase()}`;
  }
  return `/phelps/${pin.toLowerCase()}/`;
}

let grouped = {};
let sortedKeys = [];
let filtered = [];
let activePrefix = '';
let searchTerm = '';
let sortMode = 'count';
let displayLang = 'en';
let displayLang2 = '';
let allLangNames = {};

async function loadData() {
  const res = await fetch('/data/search.json');
  const raw = await res.json();

  const langCounts = {};
  raw.forEach(e => {
    let g = grouped[e.p];
    if (!g) {
      g = { p: e.p, langs: new Set(), texts: [], firsts: {} };
      grouped[e.p] = g;
    }
    g.langs.add(e.l);
    g.texts.push(e.t.slice(0, 200).toLowerCase());
    if (!g.firsts[e.l]) {
      let t = e.t.replace(/^##\s+[^\n]+\n*/g, '').trim();
      g.firsts[e.l] = t.slice(0, 150);
    }
    langCounts[e.l] = (langCounts[e.l] || 0) + 1;
    if (e.ln) allLangNames[e.l] = e.ln;
  });

  for (const p in grouped) {
    const g = grouped[p];
    g.langsArr = Array.from(g.langs).sort();
    g.n = g.langsArr.length;
    g.searchBlob = g.texts.join(' ');
    delete g.texts;
    delete g.langs;
  }

  // Build language pickers
  const uiLang = window.__uiLang || 'en';
  const uiBase = uiLang.split('-')[0];
  const bestMatch = allLangNames[uiLang] ? uiLang : allLangNames[uiBase] ? uiBase : 'en';
  displayLang = bestMatch;

  const sorted = Object.keys(langCounts).filter(l => allLangNames[l])
    .sort((a, b) => {
      if (a === bestMatch) return -1;
      if (b === bestMatch) return 1;
      if (a === 'en') return -1;
      if (b === 'en') return 1;
      return langCounts[b] - langCounts[a];
    });

  buildLangPicker('lang1', sorted, langCounts, bestMatch, function(code) {
    displayLang = code;
    renderTable();
  });
  buildLangPicker('lang2', sorted, langCounts, '', function(code) {
    displayLang2 = code;
    document.getElementById('th-second').style.display = code ? '' : 'none';
    renderTable();
  });

  sortedKeys = Object.keys(grouped);
  document.getElementById('exp-status').textContent = sortedKeys.length.toLocaleString() + ' prayer codes loaded';
  applyFilters();
}

function buildLangPicker(id, langs, counts, initial, onSelect) {
  const dropdown = document.getElementById(id + '-dropdown');
  const label = document.getElementById(id + '-label');
  const list = document.getElementById(id + '-list');
  const filterInput = document.getElementById(id + '-filter');

  // "None" option for lang2
  if (id === 'lang2') {
    const none = document.createElement('a');
    none.href = '#'; none.dataset.code = ''; none.dataset.name = '';
    none.innerHTML = '<b>— none —</b>';
    none.classList.add('active');
    none.addEventListener('click', function(ev) { ev.preventDefault(); select(''); });
    list.appendChild(none);
    label.textContent = '+ compare';
  }

  langs.forEach(l => {
    const a = document.createElement('a');
    a.href = '#'; a.dataset.code = l; a.dataset.name = (allLangNames[l] || '').toLowerCase();
    a.innerHTML = (allLangNames[l] || l) + ' <span style="color:var(--text-secondary);font-size:.8em">' + l + '</span><span class="lang-count-badge">' + counts[l] + '</span>';
    if (l === initial) a.classList.add('active');
    a.addEventListener('click', function(ev) { ev.preventDefault(); select(l); });
    list.appendChild(a);
  });

  if (initial && allLangNames[initial]) {
    label.textContent = allLangNames[initial];
  }

  function select(code) {
    list.querySelectorAll('a').forEach(a => a.classList.toggle('active', a.dataset.code === code));
    if (code) {
      label.textContent = allLangNames[code] || code;
    } else {
      label.textContent = id === 'lang2' ? '+ compare' : 'All';
    }
    dropdown.removeAttribute('open');
    onSelect(code);
  }

  // Filter
  filterInput.addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    list.querySelectorAll('a').forEach(a => {
      if (a.dataset.code === '' && id === 'lang2') { a.style.display = ''; return; }
      const match = !q || (a.dataset.name || '').indexOf(q) >= 0 || (a.dataset.code || '').indexOf(q) >= 0;
      a.style.display = match ? '' : 'none';
    });
  });

  // Close on outside click
  document.addEventListener('click', function(e) { if (!dropdown.contains(e.target)) dropdown.removeAttribute('open'); });
  dropdown.addEventListener('toggle', function() {
    if (dropdown.open) { filterInput.value = ''; filterInput.focus(); filterInput.dispatchEvent(new Event('input')); }
  });
}

function matchesPrefix(pin) {
  if (!activePrefix) return true;
  if (activePrefix === 'X') return pin.startsWith('X');
  if (activePrefix === 'UH') return pin.startsWith('UH');
  const m = pin.match(/^([A-Z]+)/);
  return m && m[1] === activePrefix;
}

function applyFilters() {
  const q = searchTerm.toLowerCase();
  filtered = sortedKeys.filter(p => {
    if (!matchesPrefix(p)) return false;
    if (!q) return true;
    const g = grouped[p];
    if (p.toLowerCase().includes(q)) return true;
    return g.searchBlob.includes(q);
  });

  if (sortMode === 'count') {
    filtered.sort((a, b) => grouped[b].n - grouped[a].n || a.localeCompare(b));
  } else {
    filtered.sort();
  }

  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('exp-body');
  const status = document.getElementById('exp-status');
  status.textContent = `${filtered.length.toLocaleString()} prayer codes`;

  const rows = filtered.slice(0, 500);
  let html = '';
  rows.forEach(p => {
    const g = grouped[p];
    const pinLink = `<a href="${phelpsUrl(p)}">${p}</a>`;
    const desc = g.firsts[displayLang] || g.firsts['en'] || Object.values(g.firsts)[0] || '';
    const maxLen = displayLang2 ? 80 : 120;
    const descShort = desc.length > maxLen ? desc.slice(0, maxLen) + '…' : desc;

    let secondCol = '';
    if (displayLang2) {
      const desc2 = g.firsts[displayLang2] || '';
      const d2 = desc2.length > 80 ? desc2.slice(0, 80) + '…' : desc2;
      secondCol = `<td style="font-size:.8rem; color:var(--text-secondary)">${d2 || '<span style="opacity:.3">—</span>'}</td>`;
    }

    const author = authorFromPin(p);
    const langs = g.langsArr;
    let langHtml = '';
    const show = langs.slice(0, 12);
    show.forEach(l => {
      langHtml += `<a class="lang-chip" href="/prayers/${l}/#${p}" title="${l}">${l}</a>`;
    });
    if (langs.length > 12) {
      langHtml += `<span style="font-size:.7rem;color:var(--text-secondary)">+${langs.length - 12}</span>`;
    }

    const countStyle = g.n >= 50 ? 'font-weight:700;color:var(--accent)' :
                       g.n >= 10 ? 'font-weight:600' : 'color:var(--text-secondary)';

    html += `<tr>
      <td class="pin-cell">${pinLink}</td>
      <td style="font-size:.75rem; color:var(--text-secondary); white-space:nowrap">${author}</td>
      <td style="font-size:.85rem">${descShort}</td>
      ${secondCol}
      <td style="text-align:right; ${countStyle}">${g.n}</td>
      <td style="font-size:.8rem; max-width:200px">${langHtml}</td>
    </tr>`;
  });
  tbody.innerHTML = html;
  if (filtered.length > 500) {
    const cols = displayLang2 ? 6 : 5;
    tbody.innerHTML += `<tr><td colspan="${cols}" style="color:var(--text-secondary); padding:.5rem">
      … ${(filtered.length - 500).toLocaleString()} more. Refine your search.
    </td></tr>`;
  }
}

// Prefix buttons
document.querySelectorAll('.prefix-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.prefix-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePrefix = btn.dataset.prefix;
    applyFilters();
  });
});

// Sort buttons
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    applyFilters();
  });
});

// Search with debounce
let searchTimer;
document.getElementById('exp-search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = e.target.value.trim();
    applyFilters();
  }, 300);
});

// URL params
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('q')) {
  document.getElementById('exp-search').value = urlParams.get('q');
  searchTerm = urlParams.get('q');
}
if (urlParams.get('prefix')) {
  activePrefix = urlParams.get('prefix');
  document.querySelectorAll('.prefix-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.prefix === activePrefix);
  });
}

loadData();
</script>
