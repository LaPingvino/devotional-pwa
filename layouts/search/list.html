<style>

<script>
const AUTHORS = {
  BH: "Bahá'u'lláh", BHU: "Bahá'u'lláh",
  AB: "ʻAbdu'l-Bahá", ABU: "ʻAbdu'l-Bahá",
  BB: "The Báb", BBU: "The Báb",
  XBH: "Bahá'u'lláh", XAB: "ʻAbdu'l-Bahá",
  UH: "Universal House of Justice", UHR: "Universal House of Justice",
  SE: "Shoghi Effendi",
};

function authorFromPin(pin) {
  const m = pin.match(/^([A-Z]+)/);
  return m ? (AUTHORS[m[1]] || '') : '';
}

function phelpsUrl(pin) {
  const n = pin.length;
  const suffix = pin.slice(n - 3);
  if (/^[A-Z]{3}$/.test(suffix) && /\d/.test(pin[n - 4])) {
    return `/phelps/${pin.slice(0, n - 3).toLowerCase()}/#${suffix.toLowerCase()}`;
  }
  return `/phelps/${pin.toLowerCase()}/`;
}

let grouped = {};
let sortedKeys = [];
let filtered = [];
let activePrefix = '';
let searchTerm = '';
let sortMode = 'count';
let displayLang = 'en';
let displayLang2 = '';
let allLangNames = {};
let filterLangs = []; // [{code, mode: 'has'|'missing'}]

const loadedPrayerLangs = new Set();
async function loadPrayerFirstLines(lang) {
  if (!lang || loadedPrayerLangs.has(lang)) return;
  loadedPrayerLangs.add(lang);
  try {
    const res = await fetch(`/data/prayers/${lang}.json`);
    if (!res.ok) return;
    const data = await res.json();
    const prayers = data.prayers || [];
    prayers.forEach(p => {
      const g = grouped[p.phelps];
      if (!g) return; // prayer not in search index — skip
      if (g.firsts[lang]) return; // already have first line from search.json
      let t = (p.text || '').replace(/<[^>]*>/g, '').replace(/^##\s+[^\n]+\n*/g, '').trim();
      if (t) g.firsts[lang] = t.slice(0, 150);
    });
    // Also add prayer codes not yet in grouped (prayer-only entries)
    prayers.forEach(p => {
      if (grouped[p.phelps]) {
        // Ensure lang is in langsArr if not already
        if (!grouped[p.phelps].langsArr.includes(lang)) {
          grouped[p.phelps].langsArr.push(lang);
          grouped[p.phelps].langsArr.sort();
          grouped[p.phelps].n = grouped[p.phelps].langsArr.length;
        }
        return;
      }
      let t = (p.text || '').replace(/<[^>]*>/g, '').replace(/^##\s+[^\n]+\n*/g, '').trim();
      const firsts = {};
      if (t) firsts[lang] = t.slice(0, 150);
      grouped[p.phelps] = {
        p: p.phelps, langsArr: [lang], n: 1, searchBlob: (t || '').slice(0, 200).toLowerCase(), firsts: firsts
      };
      sortedKeys.push(p.phelps);
    });
  } catch(e) { /* lang file doesn't exist, that's fine */ }
}

async function loadData() {
  const res = await fetch('/data/search.json');
  const raw = await res.json();

  const langCounts = {};
  raw.forEach(e => {
    let g = grouped[e.p];
    if (!g) {
      g = { p: e.p, langs: new Set(), texts: [], firsts: {} };
      grouped[e.p] = g;
    }
    g.langs.add(e.l);
    g.texts.push(e.t.slice(0, 200).toLowerCase());
    if (!g.firsts[e.l]) {
      let t = e.t.replace(/^##\s+[^\n]+\n*/g, '').trim();
      g.firsts[e.l] = t.slice(0, 150);
    }
    langCounts[e.l] = (langCounts[e.l] || 0) + 1;
    if (e.ln) allLangNames[e.l] = e.ln;
  });

  for (const p in grouped) {
    const g = grouped[p];
    g.langsArr = Array.from(g.langs).sort();
    g.n = g.langsArr.length;
    g.searchBlob = g.texts.join(' ');
    if (window.normalizeAr) g.searchBlob = normalizeAr(g.searchBlob);
    delete g.texts;
    delete g.langs;
  }

  // Build language pickers
  const uiLang = window.__uiLang || 'en';
  const uiBase = uiLang.split('-')[0];
  const bestMatch = allLangNames[uiLang] ? uiLang : allLangNames[uiBase] ? uiBase : 'en';
  displayLang = bestMatch;

  const sorted = Object.keys(langCounts).filter(l => allLangNames[l])
    .sort((a, b) => {
      if (a === bestMatch) return -1;
      if (b === bestMatch) return 1;
      if (a === 'en') return -1;
      if (b === 'en') return 1;
      return langCounts[b] - langCounts[a];
    });

  // Also include prayer-only languages in the counts/picker
  // (some languages only have prayers, not writings)
  await loadPrayerFirstLines(bestMatch);

  // Filter language picker
  buildLangPicker('filter-lang', sorted, langCounts, '', function(code) {
    if (!code) return;
    // Add as "has" filter by default; click chip to toggle to "missing"
    if (filterLangs.find(f => f.code === code)) return; // already added
    filterLangs.push({code: code, mode: 'has'});
    renderFilterChips();
    applyFilters();
  });

  buildLangPicker('lang1', sorted, langCounts, bestMatch, async function(code) {
    displayLang = code;
    await loadPrayerFirstLines(code);
    renderTable();
  });
  buildLangPicker('lang2', sorted, langCounts, '', async function(code) {
    displayLang2 = code;
    document.getElementById('th-second').style.display = code ? '' : 'none';
    if (code) await loadPrayerFirstLines(code);
    renderTable();
  });

  sortedKeys = Object.keys(grouped);
  document.getElementById('exp-status').textContent = sortedKeys.length.toLocaleString() + ' ' + window.__t('search_codes_loaded');
  applyFilters();
}

const FILTER_MODES = [
  {mode: 'has',     label: '✓', bg: '#e8f5e9', color: '#2e7d32', border: '#a5d6a7', tip: 'Must exist in this language'},
  {mode: 'any',     label: '~', bg: '#e3f2fd', color: '#1565c0', border: '#90caf9', tip: 'Exists in at least one "any" language'},
  {mode: 'missing', label: '✗', bg: '#ffebee', color: '#c62828', border: '#ef9a9a', tip: 'Must NOT exist in this language'},
];
function renderFilterChips() {
  const container = document.getElementById('filter-lang-chips');
  container.innerHTML = '';
  filterLangs.forEach((f, i) => {
    const style = FILTER_MODES.find(m => m.mode === f.mode);
    const chip = document.createElement('span');
    chip.style.cssText = `display:inline-flex;align-items:center;gap:.2rem;padding:.15rem .4rem;border-radius:4px;font-size:.75rem;cursor:pointer;user-select:none;background:${style.bg};color:${style.color};border:1px solid ${style.border}`;
    chip.title = style.tip + ' (click to cycle mode, × to remove)';
    chip.innerHTML = style.label + ' ' + (allLangNames[f.code] || f.code) + ' <span style="opacity:.5;font-size:.9em;margin-left:.2rem;padding:0 2px">×</span>';
    chip.addEventListener('click', function(ev) {
      const rect = chip.getBoundingClientRect();
      if (ev.clientX - rect.left > rect.width - 22) {
        filterLangs.splice(i, 1);
      } else {
        const idx = FILTER_MODES.findIndex(m => m.mode === f.mode);
        f.mode = FILTER_MODES[(idx + 1) % FILTER_MODES.length].mode;
      }
      renderFilterChips();
      applyFilters();
    });
    container.appendChild(chip);
  });
}

function buildLangPicker(id, langs, counts, initial, onSelect) {
  const dropdown = document.getElementById(id + '-dropdown');
  const label = document.getElementById(id + '-label');
  const list = document.getElementById(id + '-list');
  const filterInput = document.getElementById(id + '-filter');

  // "None" option for lang2
  if (id === 'lang2') {
    const none = document.createElement('a');
    none.href = '#'; none.dataset.code = ''; none.dataset.name = '';
    none.innerHTML = '<b>— none —</b>';
    none.classList.add('active');
    none.addEventListener('click', function(ev) { ev.preventDefault(); select(''); });
    list.appendChild(none);
    label.textContent = window.__t('search_compare');
  }

  langs.forEach(l => {
    const a = document.createElement('a');
    a.href = '#'; a.dataset.code = l; a.dataset.name = (allLangNames[l] || '').toLowerCase();
    a.innerHTML = (allLangNames[l] || l) + ' <span style="color:var(--text-secondary);font-size:.8em">' + l + '</span><span class="lang-count-badge">' + counts[l] + '</span>';
    if (l === initial) a.classList.add('active');
    a.addEventListener('click', function(ev) { ev.preventDefault(); select(l); });
    list.appendChild(a);
  });

  if (initial && allLangNames[initial]) {
    label.textContent = allLangNames[initial];
  }

  function select(code) {
    list.querySelectorAll('a').forEach(a => a.classList.toggle('active', a.dataset.code === code));
    if (code) {
      label.textContent = allLangNames[code] || code;
    } else {
      label.textContent = id === 'lang2' ? window.__t('search_compare') : 'All';
    }
    dropdown.removeAttribute('open');
    onSelect(code);
  }

  // Filter
  filterInput.addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    list.querySelectorAll('a').forEach(a => {
      if (a.dataset.code === '' && id === 'lang2') { a.style.display = ''; return; }
      const match = !q || (a.dataset.name || '').indexOf(q) >= 0 || (a.dataset.code || '').indexOf(q) >= 0;
      a.style.display = match ? '' : 'none';
    });
  });

  // Close on outside click
  document.addEventListener('click', function(e) { if (!dropdown.contains(e.target)) dropdown.removeAttribute('open'); });
  dropdown.addEventListener('toggle', function() {
    if (dropdown.open) { filterInput.value = ''; filterInput.focus(); filterInput.dispatchEvent(new Event('input')); }
  });
}

function matchesPrefix(pin) {
  if (!activePrefix) return true;
  if (activePrefix === 'X') return pin.startsWith('X');
  if (activePrefix === 'UH') return pin.startsWith('UH');
  const m = pin.match(/^([A-Z]+)/);
  return m && m[1] === activePrefix;
}

function applyFilters() {
  let q = searchTerm.toLowerCase();
  if (window.normalizeAr) q = normalizeAr(q);
  filtered = sortedKeys.filter(p => {
    if (!matchesPrefix(p)) return false;
    const g = grouped[p];
    // Language filter: has (must have), missing (must not have), any (at least one)
    const anyFilters = filterLangs.filter(f => f.mode === 'any');
    if (anyFilters.length > 0) {
      if (!anyFilters.some(f => g.langsArr.includes(f.code))) return false;
    }
    for (const f of filterLangs) {
      if (f.mode === 'any') continue; // handled above
      const hasLang = g.langsArr.includes(f.code);
      if (f.mode === 'has' && !hasLang) return false;
      if (f.mode === 'missing' && hasLang) return false;
    }
    if (!q) return true;
    if (p.toLowerCase().includes(q)) return true;
    return g.searchBlob.includes(q);
  });

  if (sortMode === 'count') {
    filtered.sort((a, b) => grouped[b].n - grouped[a].n || a.localeCompare(b));
  } else {
    filtered.sort();
  }

  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('exp-body');
  const status = document.getElementById('exp-status');
  status.textContent = `${filtered.length.toLocaleString()} ${window.__t('search_codes')}`;

  const rows = filtered.slice(0, 500);
  let html = '';
  rows.forEach(p => {
    const g = grouped[p];
    const pinLink = `<a href="${phelpsUrl(p)}">${p}</a>`;
    const desc = g.firsts[displayLang] || g.firsts['en'] || Object.values(g.firsts)[0] || '';
    const maxLen = displayLang2 ? 80 : 120;
    const descShort = desc.length > maxLen ? desc.slice(0, maxLen) + '…' : desc;

    let secondCol = '';
    if (displayLang2) {
      const desc2 = g.firsts[displayLang2] || '';
      const d2 = desc2.length > 80 ? desc2.slice(0, 80) + '…' : desc2;
      secondCol = `<td style="font-size:.8rem; color:var(--text-secondary)">${d2 || '<span style="opacity:.3">—</span>'}</td>`;
    }

    const author = authorFromPin(p);
    const langs = g.langsArr;
    let langHtml = '';
    const show = langs.slice(0, 12);
    show.forEach(l => {
      langHtml += `<a class="lang-chip" href="/prayers/${l}/#${p}" title="${l}">${l}</a>`;
    });
    if (langs.length > 12) {
      langHtml += `<span style="font-size:.7rem;color:var(--text-secondary)">+${langs.length - 12}</span>`;
    }

    const countStyle = g.n >= 50 ? 'font-weight:700;color:var(--accent)' :
                       g.n >= 10 ? 'font-weight:600' : 'color:var(--text-secondary)';

    html += `<tr>
      <td class="pin-cell">${pinLink}</td>
      <td style="font-size:.75rem; color:var(--text-secondary); white-space:nowrap">${author}</td>
      <td style="font-size:.85rem">${descShort}</td>
      ${secondCol}
      <td style="text-align:right; ${countStyle}">${g.n}</td>
      <td style="font-size:.8rem; max-width:200px">${langHtml}</td>
    </tr>`;
  });
  tbody.innerHTML = html;
  if (filtered.length > 500) {
    const cols = displayLang2 ? 6 : 5;
    tbody.innerHTML += `<tr><td colspan="${cols}" style="color:var(--text-secondary); padding:.5rem">
      … ${(filtered.length - 500).toLocaleString()} more. Refine your search.
    </td></tr>`;
  }
  // Re-apply transliteration if active
  if (window.__translitActive && window.__translitActive()) {
    // Remove old table annotations, re-add on new content
    var table = document.getElementById('exp-table');
    table.querySelectorAll('.translit-line, .translit-replaced').forEach(function(el) {
      if (el.classList.contains('translit-replaced')) {
        var orig = el.getAttribute('data-translit-orig');
        if (orig) { el.innerHTML = orig; el.removeAttribute('data-translit-orig'); el.classList.remove('translit-replaced'); }
      } else { el.remove(); }
    });
    if (window.__addTranslitIn) window.__addTranslitIn(table);
  }
  enableResize(document.getElementById('exp-table'));
}

function enableResize(table) {
  if (window.innerWidth <= 600) return;
  // Reset to auto-size first so the browser computes natural widths
  table.classList.remove('resizable');
  table.querySelectorAll('thead th').forEach(th => { th.style.width = ''; });
  requestAnimationFrame(() => {
    const ths = table.querySelectorAll('thead th');
    ths.forEach(th => {
      if (th.offsetWidth && th.style.display !== 'none')
        th.style.width = th.offsetWidth + 'px';
    });
    table.classList.add('resizable');
  });
}

// Prefix buttons
document.querySelectorAll('.prefix-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.prefix-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePrefix = btn.dataset.prefix;
    applyFilters();
  });
});

// Sort buttons
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    applyFilters();
  });
});

// Search with debounce
let searchTimer;
document.getElementById('exp-search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = e.target.value.trim();
    applyFilters();
  }, 300);
});

// URL params
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('q')) {
  document.getElementById('exp-search').value = urlParams.get('q');
  searchTerm = urlParams.get('q');
}
if (urlParams.get('prefix')) {
  activePrefix = urlParams.get('prefix');
  document.querySelectorAll('.prefix-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.prefix === activePrefix);
  });
}

loadData();
</script>
