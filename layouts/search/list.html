{{ partial "head.html" (dict "Title" "Search" "Lang" "en") }}
<div class="main-content">
  <h1 data-i18n="search_title">Search</h1>
  <p style="color:var(--text-secondary); margin-bottom:1rem;">
    Browse all prayers and writings by Phelps code. Sorted by number of translations.
  </p>

  <div class="inventory-controls">
    <button class="prefix-btn active" data-prefix="">All</button>
    <button class="prefix-btn" data-prefix="BH" title="Bahá'u'lláh">BH</button>
    <button class="prefix-btn" data-prefix="AB" title="ʻAbdu'l-Bahá">AB</button>
    <button class="prefix-btn" data-prefix="BB" title="The Báb">BB</button>
    <button class="prefix-btn" data-prefix="BHU">BHU</button>
    <button class="prefix-btn" data-prefix="ABU">ABU</button>
    <button class="prefix-btn" data-prefix="BBU">BBU</button>
    <button class="prefix-btn" data-prefix="TMP">TMP</button>
    <button class="prefix-btn" data-prefix="X">X</button>
    <input type="search" class="search-box" id="exp-search" placeholder="Search code, first line, subjects…">
  </div>

  <div style="display:flex; gap:.5rem; align-items:center; margin-bottom:.5rem; flex-wrap:wrap;">
    <div id="exp-status" style="font-size:.85rem; color:var(--text-secondary);"></div>
    <div style="margin-left:auto; font-size:.8rem; color:var(--text-secondary);">
      Sort:
      <button class="sort-btn active" data-sort="count" title="Most translations first">Languages ↓</button>
      <button class="sort-btn" data-sort="code" title="Alphabetical by code">Code ↑</button>
    </div>
  </div>

  <table class="inventory-table" id="exp-table">
    <thead>
      <tr>
        <th style="cursor:pointer" id="th-code">Code</th>
        <th>Author</th>
        <th>First line / Description</th>
        <th style="cursor:pointer; text-align:right" id="th-langs"># Langs</th>
        <th>Languages</th>
      </tr>
    </thead>
    <tbody id="exp-body">
      <tr><td colspan="5" style="padding:1rem; color:var(--text-secondary)">Loading…</td></tr>
    </tbody>
  </table>
</div>

<style>
.sort-btn {
  padding: .15rem .5rem; border: 1px solid var(--border); border-radius: 3px;
  background: var(--surface); cursor: pointer; font-size: .8rem; color: var(--text-secondary);
}
.sort-btn:hover, .sort-btn.active { border-color: var(--accent); color: var(--accent); background: #fff3ef; }
.lang-chip {
  display:inline-block; padding:.05rem .3rem; margin:.05rem; background:#f0f0f0;
  border-radius:3px; font-size:.7rem; color:var(--text); text-decoration:none;
}
.lang-chip:hover { background:#ff7954; color:#fff; }
</style>

<script>
const AUTHORS = {
  BH: "Bahá'u'lláh", BHU: "Bahá'u'lláh",
  AB: "ʻAbdu'l-Bahá", ABU: "ʻAbdu'l-Bahá",
  BB: "The Báb", BBU: "The Báb",
  XBH: "Bahá'u'lláh", XAB: "ʻAbdu'l-Bahá",
};

function authorFromPin(pin) {
  const m = pin.match(/^([A-Z]+)/);
  return m ? (AUTHORS[m[1]] || '') : '';
}

function prefixFromPin(pin) {
  const m = pin.match(/^([A-Z]+)/);
  return m ? m[1] : '';
}

function phelpsUrl(pin) {
  const n = pin.length;
  const suffix = pin.slice(n - 3);
  if (/^[A-Z]{3}$/.test(suffix) && /\d/.test(pin[n - 4])) {
    return `/phelps/${pin.slice(0, n - 3).toLowerCase()}/#${suffix.toLowerCase()}`;
  }
  return `/phelps/${pin.toLowerCase()}/`;
}

let allEntries = [];
let filtered = [];
let activePrefix = '';
let searchTerm = '';
let sortMode = 'count'; // 'count' or 'code'

async function loadExplorer() {
  const res = await fetch('/data/explorer.json');
  allEntries = await res.json();
  applyFilters();
}

function applyFilters() {
  filtered = allEntries.filter(e => {
    const pre = prefixFromPin(e.p);
    if (activePrefix) {
      if (activePrefix === 'X') {
        if (!e.p.startsWith('X')) return false;
      } else if (pre !== activePrefix) return false;
    }
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      return e.p.toLowerCase().includes(q)
          || (e.f || '').toLowerCase().includes(q)
          || (e.t || '').toLowerCase().includes(q)
          || (e.s || '').toLowerCase().includes(q);
    }
    return true;
  });

  if (sortMode === 'count') {
    filtered.sort((a, b) => b.n - a.n || a.p.localeCompare(b.p));
  } else {
    filtered.sort((a, b) => a.p.localeCompare(b.p));
  }

  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('exp-body');
  const status = document.getElementById('exp-status');
  status.textContent = `${filtered.length.toLocaleString()} prayer codes`;

  const rows = filtered.slice(0, 500);
  let html = '';
  rows.forEach(e => {
    const pinLink = `<a href="${phelpsUrl(e.p)}">${e.p}</a>`;
    const desc = e.f || e.t || '';
    const descShort = desc.length > 120 ? desc.slice(0, 120) + '…' : desc;
    const author = authorFromPin(e.p);

    // Show first 10 languages as chips, rest as count
    const langs = e.l || [];
    let langHtml = '';
    const show = langs.slice(0, 12);
    show.forEach(l => {
      langHtml += `<a class="lang-chip" href="/prayers/${l}/#${e.p}" title="${l}">${l}</a>`;
    });
    if (langs.length > 12) {
      langHtml += `<span style="font-size:.7rem;color:var(--text-secondary)">+${langs.length - 12}</span>`;
    }

    const countStyle = e.n >= 50 ? 'font-weight:700;color:var(--accent)' :
                       e.n >= 10 ? 'font-weight:600' : 'color:var(--text-secondary)';

    html += `<tr>
      <td class="pin-cell">${pinLink}</td>
      <td style="font-size:.75rem; color:var(--text-secondary); white-space:nowrap">${author}</td>
      <td style="font-size:.85rem">${descShort}</td>
      <td style="text-align:right; ${countStyle}">${e.n}</td>
      <td style="font-size:.8rem; max-width:200px">${langHtml}</td>
    </tr>`;
  });
  tbody.innerHTML = html;
  if (filtered.length > 500) {
    tbody.innerHTML += `<tr><td colspan="5" style="color:var(--text-secondary); padding:.5rem">
      … ${(filtered.length - 500).toLocaleString()} more. Refine your search.
    </td></tr>`;
  }
}

// Prefix buttons
document.querySelectorAll('.prefix-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.prefix-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePrefix = btn.dataset.prefix;
    applyFilters();
  });
});

// Sort buttons
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    applyFilters();
  });
});

// Search
let searchTimer;
document.getElementById('exp-search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = e.target.value.trim();
    applyFilters();
  }, 200);
});

// URL params
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('q')) {
  document.getElementById('exp-search').value = urlParams.get('q');
  searchTerm = urlParams.get('q');
}
if (urlParams.get('prefix')) {
  activePrefix = urlParams.get('prefix');
  document.querySelectorAll('.prefix-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.prefix === activePrefix);
  });
}

loadExplorer();
</script>
