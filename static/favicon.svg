<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="48" fill="#ff7954"/>
  <!-- 9-pointed star (Bahá'í symbol) approximated as overlapping triangles -->
  <g fill="white" transform="translate(50,50)">
    <polygon points="0,-38 8,-12 -8,-12" transform="rotate(0)"/>
    <polygon points="0,-38 8,-12 -8,-12" transform="rotate(40)"/>
    <polygon points="0,-38 8,-12 -8,-12" transform="rotate(80)"/>
    <polygon points="0,-38 8,-12 -8,-12" transform="rotate(120)"/>
    <polygon points="0,-38 8,-12 -8,-12" transform="rotate(160)"/>
    <polygon points="0,-38 8,-12 -8,-12" transform="rotate(200)"/>
    <polygon points="0,-38 8,-12 -8,-12" transform="rotate(240)"/>
    <polygon points="0,-38 8,-12 -8,-12" transform="rotate(280)"/>
    <polygon points="0,-38 8,-12 -8,-12" transform="rotate(320)"/>
    <circle cx="0" cy="0" r="10" fill="white"/>
  </g>
</svg>
